  - title: Projects
    layout: list
    content:
      - layout: top-middle
        title: 아진산업 — 제조 공정 물류 추적 시스템
        caption: 2025.09 - 2026.03
        additional_links:
          - title: PDF 발표자료
            icon: fas fa-file-pdf
            url: /assets/docs/ajin-rfid-project.pdf
        quote: >
          제조 공정 이해를 바탕으로 작업 흐름과 데이터 구조를 설계하고, AI와 협업해 RFID 기반 이력 추적 시스템을 구체화한 기업 연계 프로젝트입니다.
        description: |
          **[프로젝트 배경]**
          
          이전 자동화 기구 설계 경력을 통해 제조 현장의 장비 메커니즘과 공정 흐름에 대한 실무 지식을 갖추고 있었습니다. 
          이를 바탕으로 물류 추적 시스템 구축 프로젝트에서 단순한 기능 구현을 넘어, RFID 스캔 시점부터 불량 발생 시 역추적 프로세스까지 현장 운영에 실질적으로 필요한 요구사항을 효과적으로 도출하여 시스템을 기획했습니다.
          
          **[핵심 역할]**
          - **공정 구조 정의 및 요구사항 설계**: 제조 공정 흐름을 분석하고, 팔레트 단위 IN/OUT, LOT 추적, 불량 역추적 규칙까지 시스템 동작 구조를 먼저 설계했습니다.
          - **ERD 및 데이터 흐름 설계**: 어떤 데이터를 어느 시점에 기록해야 하는지 정리하고, 그 흐름에 맞춰 ERD와 API 중심 데이터 구조를 설계했습니다.
          - **AI 협업 기반 구현 주도**: 구현 자체를 혼자 직접 모두 작성했다기보다, 필요한 기능과 동작 규칙을 세분화해 AI에게 명확히 지시하고 결과물을 검토·수정하며 원하는 형태로 수렴시켰습니다.
          - **백엔드/인프라 구체화**: FastAPI, MySQL, Docker Compose 기반으로 팀이 연동 가능한 서버 환경을 정리하고, 프론트엔드 및 임베디드와 연결 가능한 기반을 마련했습니다.
          
          > 프로젝트의 핵심은 '직접 코드를 얼마나 많이 썼는가'보다, 현장 문제를 구조화하고 AI를 활용해 구현 가능한 단위로 분해한 뒤, 원하는 동작이 나오도록 지속적으로 지시·검증·수정한 점에 있었습니다.
          
          > 대외 공개가 어려운 코드 대신, 포트폴리오에서는 프로젝트 발표자료 PDF를 통해 문제 정의, 시스템 구조, 공정 흐름, 기대 효과를 확인할 수 있도록 구성했습니다.
          
          **[기술 스택]**: Python, FastAPI, MySQL, Docker, Docker Compose
          
          **[핵심 성과]**
          - 제조 공정 흐름과 RFID 인식 시점을 시스템 규칙으로 정리해, 수기 관리 구간을 전산 추적 구조로 전환
          - 팔레트, LOT, 공정 이력을 연결하는 ERD 및 데이터 기록 기준을 설계해 추적 가능한 구조 마련
          - AI를 구현 파트너로 활용하면서도 요구사항 정의, 결과 검증, 수정 방향 제시를 주도해 실무형 AI 활용 역량을 프로젝트 결과물로 증명

      - layout: top-middle
        title: 42경산 — 시스템 프로그래밍 과제
        caption: 2024.10 - Present
        link: https://github.com/gkrtjd99/42
        additional_links:
          - title: GitHub
            icon: fab fa-github
            url: https://github.com/gkrtjd99/42
        quote: >
          C/C++ 기반 시스템 프로그래밍 과제를 통해 저수준 프로그래밍과 알고리즘 역량을 강화했습니다.
        description: |
          **[완료한 주요 과제]**
          - **Inception**: Docker Compose를 활용한 다중 컨테이너 인프라 구축 (NGINX, MariaDB, 볼륨 및 네트워크 관리)
          - **minishell**: Bash와 유사한 쉘 프로그램 구현 (파이프, 리다이렉션, 환경 변수, 시그널 처리)
          - **Philosophers**: 멀티스레딩과 뮤텍스를 이용한 동기화 문제 해결 (식사하는 철학자 문제, 데드락 방지)
          - **cub3d**: 레이캐스팅 기법을 활용한 3D 그래픽 엔진 구현 (Wolfenstein 3D 스타일)
          - **push_swap**: 스택 2개를 사용한 정렬 알고리즘 최적화 (최소 연산 횟수 도전)
          
          **[기술 스택]**: C, C++, Docker, Docker Compose, Makefile
          
          **[학습 성과]**
          - Docker 컨테이너화를 통한 인프라 구축 경험
          - 메모리 누수 없는 안전한 코드 작성 (Valgrind 검증)
          - 알고리즘 최적화 및 시간 복잡도 개선 경험
          - 동시성 프로그래밍과 프로세스/스레드 관리 이해

