about_content: | # this will include new lines to allow paragraphs
  **물리적 자동화에서 디지털 자동화로 나아가는 소프트웨어 엔지니어입니다.**
  과거 정밀한 광학계와 자동화 장비를 직접 설계하며 시스템의 물리적 기반을 다졌습니다. 
  하지만 아무리 장비를 잘 구축해도, 결국 시스템에 생명력을 불어넣고 성능을 판가름하는 핵심은 소프트웨어와 데이터라는 것을 현장에서 뼈저리게 깨달았습니다.
  
  특히 AI 기반의 머신비전 알고리즘이 검사의 질을 높이고, 수집된 데이터를 통해 원격으로 모든 공정 상황이 파악되고 제어되는 과정을 지켜보며 소프트웨어의 무한한 확장성에 매료되었습니다.
  
  결국 소프트웨어 엔지니어로의 전향을 마음먹고 뛰어들었으며, 하드웨어가 움직이는 원리를 아는 저만의 강점을 바탕으로 시스템 전체를 제어하고 혁신하고자 합니다.
  소프트웨어 및 서버 시스템 설계 역시 요구사항 분석, 아키텍처 설계, 데이터 흐름 설계라는 점에서 기존 기구 설계 경험과 본질적으로 맞닿아 있습니다.
  하드웨어에서 추구했던 안정성과 효율성을 소프트웨어 개발 전반에 적용하여, 견고하고 확장 가능한 시스템을 창조하는 엔지니어로 성장하고자 합니다.
  
content:
  - title: Skills
