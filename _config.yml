        sub_title: 소프트웨어 개발 교육 본과정
        description: |
          자기주도적 문제 해결과 동료 학습(Peer-to-peer) 기반의 에꼴42 시스템에서 소프트웨어 엔지니어로 성장하고 있습니다.
          
          - 과제 기반 학습을 통해 정해진 답 없이 스스로 시스템을 분석하고 구현 방향을 기획하는 역량 강화
          - 동료 평가시스템을 바탕으로 타인의 코드를 분석하며 건설적인 피드백을 주고받는 협업 능력 배양
          
      - layout: left
        title: Washington Technology Industry Association (WTIA)
        caption: 2026.01 ~ 2026.02
        sub_title: IT 비즈니스 기획 및 전략 연수
        description: |
          미국 시애틀 현지 멘토링 프로그램에 참여하여 IT 프로덕트 기획 및 비즈니스 전략을 학습했습니다.
          
          - **JTBD 기반 기획 프로세스 체득**: 현지 멘토링을 통해 신규 서비스 아이디어를 기획하고, JTBD(Jobs to Be Done) 방법론을 적용해 가상의 타겟 고객 페인포인트를 논리적으로 정의
          - **비즈니스 관점의 기술 적용**: 코딩에 앞서 '왜 이 시스템이 필요한가'부터 고민하는 기획 및 문제 해결 프로세스 훈련
          - **세일즈 파이프라인 수립**: 아이디어가 실제 시장에 진출한다고 가정하고, 어떤 고객군을 먼저 타겟팅하여 세일즈할 것인지 90일 파이프라인 계획
          - **제품 중심 사고 함양**: 개발된 기술과 솔루션이 어떻게 실제 비즈니스 지표(매출, 고객 확보)와 직접적으로 연결되는지에 대한 폭넓은 시야 확보



